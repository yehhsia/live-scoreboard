<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時競賽看板系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Noto Sans TC', sans-serif; } .bg-emerald-900-custom { background-color: #064e3b; } </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 flex flex-col">

  <header class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center shadow-sm gap-4">
    <div class="flex items-center space-x-3">
      <div class="w-8 h-8 rounded-lg bg-emerald-600 flex items-center justify-center text-white font-bold text-lg shadow-md">🏆</div>
      <div>
        <h1 class="text-xl font-bold text-gray-900 tracking-wide">競賽即時控制中心</h1>
      </div>
    </div>
    <div class="flex bg-gray-100 p-1 rounded-xl border border-gray-200">
      <button id="tab-board-btn" onclick="switchTab('board')" class="px-5 py-2 rounded-lg text-sm font-bold bg-white text-emerald-700 shadow-sm">📊 即時排行榜</button>
      <button id="tab-admin-btn" onclick="switchTab('admin')" class="px-5 py-2 rounded-lg text-sm font-medium text-gray-600">⚙️ 分數登錄頁</button>
    </div>
  </header>

  <main class="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full">
    <section id="section-board" class="block">
      <div class="bg-emerald-900-custom text-white rounded-3xl p-6 md:p-10 shadow-2xl mb-8 relative overflow-hidden border border-emerald-800">
        <h2 class="text-3xl font-bold tracking-tight">競賽即時排行榜</h2>
        <p class="text-emerald-200 text-sm mt-1">每 5 秒自動同步雲端數據</p>
      </div>
      <div id="leaderboard-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        </div>
    </section>

    <section id="section-admin" class="hidden">
      <div class="max-w-xl mx-auto bg-white rounded-2xl border border-gray-200 shadow-xl overflow-hidden">
        <div class="bg-emerald-600 px-6 py-5 text-white"><h2 class="text-xl font-bold">🎯 後端分數登錄控制台</h2></div>
        <div class="p-6 space-y-6">
          <div id="alert-box" class="hidden p-4 rounded-xl text-sm font-medium"></div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">請選取評分組別</label>
            <select id="group-select" class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-3 text-gray-900 font-medium"></select>
          </div>
          <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
            <span class="block text-xs font-bold text-gray-500 mb-3">方式一：快速微調分數</span>
            <div class="grid grid-cols-4 gap-2">
              <button onclick="submitScoreChange('change', 1)" class="admin-btn py-2.5 rounded-lg font-bold text-sm bg-emerald-50 text-emerald-700 border border-emerald-200">+1</button>
              <button onclick="submitScoreChange('change', 5)" class="admin-btn py-2.5 rounded-lg font-bold text-sm bg-emerald-600 text-white">+5</button>
              <button onclick="submitScoreChange('change', -1)" class="admin-btn py-2.5 rounded-lg font-bold text-sm bg-red-50 text-red-700 border border-red-200">-1</button>
              <button onclick="submitScoreChange('change', -5)" class="admin-btn py-2.5 rounded-lg font-bold text-sm bg-red-600 text-white">-5</button>
            </div>
          </div>
          <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
            <span class="block text-xs font-bold text-gray-500 mb-3">方式二：直接給定總分</span>
            <div class="flex gap-2">
              <input type="number" id="direct-score-input" placeholder="請輸入分數" class="flex-grow bg-white border border-gray-300 rounded-lg px-4 py-2.5 text-sm">
              <button id="submit-direct-btn" onclick="submitDirectScore()" class="admin-btn bg-gray-900 text-white px-6 py-2.5 rounded-lg font-medium text-sm">確認提交</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    // 確保存接你最新部署出來的所有人存取網址
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyc1ZyZHbk2IWDwrtLthl82h9DmVsh1hY3e5iWmDEtESF3QZ_ySM6dJN-g3gct3QB2evg/exec";

    // 建立本地預設的 30 組資料備用庫，防止網路慢或格式錯誤時畫面空白
    let localBackupData = [];
    const groupSelect = document.getElementById('group-select');
    
    for (let i = 1; i <= 15; i++) {
      let name = `乾道第 ${i} 組`;
      localBackupData.push({ group: name, score: 0 });
      let opt = document.createElement('option'); opt.value = name; opt.textContent = name; groupSelect.appendChild(opt);
    }
    for (let j = 1; j <= 15; j++) {
      let name = `坤道第 ${j} 組`;
      localBackupData.push({ group: name, score: 0 });
      let opt = document.createElement('option'); opt.value = name; opt.textContent = name; groupSelect.appendChild(opt);
    }

    // 初始加載：不管雲端好了沒，網頁一開立刻先把 30 組畫出來！
    renderLeaderboard(localBackupData);

    function switchTab(target) {
      const boardBtn = document.getElementById('tab-board-btn');
      const adminBtn = document.getElementById('tab-admin-btn');
      const boardSec = document.getElementById('section-board');
      const adminSec = document.getElementById('section-admin');
      if (target === 'board') {
        boardBtn.className = "px-5 py-2 rounded-lg text-sm font-bold bg-white text-emerald-700 shadow-sm";
        adminBtn.className = "px-5 py-2 rounded-lg text-sm font-medium text-gray-600";
        boardSec.classList.remove('hidden'); adminSec.classList.add('hidden'); fetchScores();
      } else {
        adminBtn.className = "px-5 py-2 rounded-lg text-sm font-bold bg-white text-emerald-700 shadow-sm";
        boardBtn.className = "px-5 py-2 rounded-lg text-sm font-medium text-gray-600";
        adminSec.classList.remove('hidden'); boardSec.classList.add('hidden');
      }
    }

    async function fetchScores() {
      try {
        const response = await fetch(GAS_API_URL);
        const result = await response.json();
        
        // 強大容錯邏輯：相容各種大大小小格式回傳
        if (result && (result.status === "success" || Array.isArray(result.data))) {
          const cloudData = result.data;
          // 將雲端數據同步到本地
          cloudData.forEach(cloudItem => {
            let localItem = localBackupData.find(l => l.group === cloudItem.group);
            if (localItem) localItem.score = Number(cloudItem.score) || 0;
          });
        }
      } catch (error) { 
        console.warn("後端正在初始化，先沿用本地畫板數據"); 
      } finally {
        // 無論連線成功或失敗，都立刻進行「高低分排序」並畫出畫面
        const sortedData = [...localBackupData].sort((a, b) => b.score - a.score);
        renderLeaderboard(sortedData);
      }
    }

    function renderLeaderboard(data) {
      const grid = document.getElementById('leaderboard-grid');
      grid.innerHTML = '';
      data.forEach((item, index) => {
        const rank = index + 1;
        let cardStyle = "bg-white border border-gray-200";
        let rankBadge = `<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-semibold">No.${rank}</span>`;
        if (rank === 1) { cardStyle = "bg-gradient-to-br from-amber-50 to-orange-100/60 border-2 border-amber-400 shadow-md"; rankBadge = `🥇 冠軍`; }
        else if (rank === 2) { cardStyle = "bg-gradient-to-br from-slate-50 to-slate-100 border-2 border-slate-300 shadow-sm"; rankBadge = `🥈 亞軍`; }
        else if (rank === 3) { cardStyle = "bg-gradient-to-br from-orange-50 to-orange-100/40 border-2 border-orange-300 shadow-sm"; rankBadge = `🥉 季軍`; }
        
        grid.insertAdjacentHTML('beforeend', `
          <div class="p-5 rounded-2xl ${cardStyle} flex justify-between items-center transition-all duration-300">
            <div><div>${rankBadge}</div><div class="text-lg font-bold text-gray-800">${item.group}</div></div>
            <div class="text-right"><div class="text-xs text-gray-400">Score</div><div class="text-3xl font-black text-emerald-800">${item.score}</div></div>
          </div>
        `);
      });
    }

    async function sendDataToGAS(payload) {
      setLoadingState(true); showAlert('', 'clear');
      
      // 先在前端更新分數（讓使用者點擊加分時體感上有立刻變動）
      let target = localBackupData.find(l => l.group === payload.group);
      if (target) {
        if (payload.action === 'change') target.score += payload.value;
        else target.score = payload.value;
        const sortedData = [...localBackupData].sort((a, b) => b.score - a.score);
        renderLeaderboard(sortedData);
      }

      try {
        await fetch(GAS_API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        showAlert(`分數已發送同步！`, 'success');
        document.getElementById('direct-score-input').value = '';
      } catch (error) { 
        showAlert('同步至雲端時發生微小延遲', 'error'); 
      } finally { 
        setLoadingState(false); 
        setTimeout(fetchScores, 1000); // 1秒後再去抓一次雲端最新狀態
      }
    }

    function submitScoreChange(action, value) { sendDataToGAS({ group: groupSelect.value, action, value }); }
    function submitDirectScore() {
      const inputVal = document.getElementById('direct-score-input').value;
      if (inputVal === '') { showAlert('請輸入分數！', 'error'); return; }
      sendDataToGAS({ group: groupSelect.value, action: 'set', value: Number(inputVal) });
    }
    function setLoadingState(isLoading) {
      document.querySelectorAll('.admin-btn').forEach(btn => btn.disabled = isLoading);
    }
    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      if (type === 'clear') { box.className = "hidden"; return; }
      box.classList.remove('hidden'); box.textContent = msg;
      if (type === 'success') { box.className = "p-4 rounded-xl text-sm font-medium bg-green-50 text-green-800 border border-green-200"; setTimeout(() => box.className = "hidden", 2500); }
      else if (type === 'error') { box.className = "p-4 rounded-xl text-sm font-medium bg-red-50 text-red-800 border border-red-200"; }
    }

    // 啟動定時器
    fetchScores();
    setInterval(fetchScores, 5000);
  </script>
</body>
</html>
